version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "12000:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./BLOG.md:/usr/share/nginx/html/blog.md
      - ./HOWTO.md:/usr/share/nginx/html/howto.md
    restart: unless-stopped

  # Optional: Python API service for dynamic content
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: python -m http.server 12001
    ports:
      - "12001:12001"
    restart: unless-stopped